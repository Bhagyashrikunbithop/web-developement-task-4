<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Store | Product Catalog</title>
    <link rel="stylesheet" href="task4_shoping.css">
</head>
<body>
    <div class="container">
        <aside class="filters">
            <h3>Refine Results</h3>
            
            <div class="filter-group">
                <label>Search Products</label>
                <input type="text" id="searchInput" placeholder="Search by name...">
            </div>

            <div class="filter-group">
                <label>Category</label>
                <select id="categoryFilter">
                    <option value="all">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Home & Office">Home & Office</option>
                    <option value="Fitness">Fitness</option>
                    <option value="Kitchen">Kitchen</option>
                    <option value="Accessories">Accessories</option>
                    <option value="Makeup">Makeup</option>

                </select>
            </div>

            <div class="filter-group">
                <label>Set Max Price ($)</label>
                <input type="number" id="priceInput" value="1000" min="0">
                <input type="range" id="priceRange" min="0" max="1000" value="1000">
            </div>

            <div class="filter-group">
                <label>Sort By</label>
                <select id="sortOptions">
                    <option value="default">Newest First</option>
                    <option value="low">Price: Low to High</option>
                    <option value="high">Price: High to Low</option>
                    <option value="rating">Top Rated</option>
                </select>
            </div>
            
            <button id="resetBtn" class="reset-btn">Clear All Filters</button>
        </aside>

        <main id="productGrid" class="grid"></main>
    </div>
    <script src="task4_shoping.js"></script>
</body>
</html>
